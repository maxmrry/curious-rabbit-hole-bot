name: Autonomous Rabbit Hole Agent

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: 

jobs:
  explore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
        
    - name: Run Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        LISTEN_NOTES_API_KEY: ${{ secrets.LISTEN_NOTES_API_KEY }}
        PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
        PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}
      run: python agent.py
      
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Track the new folder structure
        git add state/memory.json docs/feed.xml
        
        if git diff --quiet && git diff --staged --quiet; then
          echo "No changes to commit."
        else
          git commit -m "🤖 Brain updated memory and RSS feed"
          
          max_attempts=3
          attempt=1
          while ! git push; do
            if [ $attempt -eq $max_attempts ]; then
              echo "Git push failed after $max_attempts attempts. Exiting."
              exit 1
            fi
            echo "GitHub server error on push. Retrying in 2 minutes (Attempt $attempt of $max_attempts)..."
            sleep 120
            attempt=$((attempt + 1))
          done
          echo "Push successful!"
        fi
